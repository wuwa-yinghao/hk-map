<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>香港地推分區地圖</title>
<style>
/* 滿版核心設定：強迫 HTML 和 Body 佔滿 100% 寬高，並禁止整頁捲動 */
html, body { height: 100%; width: 100%; overflow: hidden; margin: 0; padding: 0; }
body { font-family: -apple-system, "PingFang HK", "Microsoft JhengHei", sans-serif; background: #0d1117; color: #e0e0e0; }

/* 容器佔滿全螢幕 (100vh) */
.container { width: 100%; height: 100vh; background: #161b22; display: flex; flex-direction: column; }

.title-bar { background: #0f2940; color: #fff; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 20; }
.title-bar h1 { font-size: 18px; font-weight: 600; }
.title-bar span { font-size: 11px; opacity: 0.5; }

/* 地圖包圍層：佔滿剩餘垂直空間 */
.map-wrap { position: relative; flex-grow: 1; user-select: none; -webkit-user-select: none; touch-action: none; overflow: hidden; background: #0d1117; }
svg { width: 100%; height: 100%; display: block; cursor: grab; }
svg:active { cursor: grabbing; }

.district { cursor: pointer; transition: filter 0.2s; stroke-width: 1.5; }
.district:hover { filter: brightness(1.3); stroke-width: 2.5; }
.district.active { stroke: #c8973e !important; stroke-width: 3; filter: brightness(1.2); }
.district-label { pointer-events: none; font-size: 10px; font-weight: 600; text-anchor: middle; dominant-baseline: central; }
.person-label { pointer-events: none; font-size: 8px; font-weight: 500; text-anchor: middle; dominant-baseline: central; }

/* 詳情面板：在電腦版懸浮，在手機版底部滿版 */
.info-panel {
  position: absolute; bottom: 16px; left: 16px; right: 16px;
  background: rgba(28, 35, 51, 0.96); border: 1px solid #2d3a4e; border-radius: 12px;
  padding: 16px 20px; display: none; z-index: 30;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
}
.info-panel.show { display: block; animation: slideUp 0.25s ease-out; }
@keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.info-panel .close { position: absolute; top: 10px; right: 14px; cursor: pointer; font-size: 24px; color: #888; padding: 4px;}

.info-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.info-badge { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 15px; flex-shrink: 0; }
.info-title { font-size: 17px; font-weight: 600; color: #fff; }
.info-sub { font-size: 13px; color: #6a8099; }

.info-details { display: grid; grid-template-columns: auto 1fr; gap: 6px 16px; font-size: 13px; align-items: center; }
.info-details dt { color: #4a6070; }
.info-details dd { font-weight: 500; color: #b8c8d8; }

.legend { display: flex; flex-wrap: wrap; gap: 14px; padding: 10px 20px; border-top: 1px solid #1e2a3a; flex-shrink: 0; background: #161b22; z-index: 20; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #6a8099; }
.legend-item span:first-child { width: 12px; height: 12px; border-radius: 2px; }

.toggle-row { display: flex; gap: 6px; padding: 10px 20px; border-bottom: 1px solid #1e2a3a; flex-wrap: wrap; align-items: center; flex-shrink: 0; background: #161b22; z-index: 20; }
.toggle-label { font-size: 12px; color: #4a6070; }
.toggle-btn { font-size: 11px; padding: 6px 10px; border-radius: 6px; border: 1px solid #2d3a4e; background: transparent; color: #7f8c8d; cursor: pointer; }
.toggle-btn.on { background: #1a4a2e; color: #2ecc71; border-color: #1a4a2e; }

.edit-btn { margin-left: 8px; padding: 4px 10px; font-size: 11px; background: #2d3a4e; color: #b8c8d8; border: 1px solid #4a6070; border-radius: 4px; cursor: pointer; }

@media (max-width: 600px) {
  .info-panel { bottom: 0; left: 0; right: 0; border-radius: 16px 16px 0 0; padding: 20px 20px 40px 20px; border: none; }
  .toggle-btn { padding: 8px 12px; font-size: 12px; }
  .title-bar h1 { font-size: 16px; }
}
</style>
</head>
<body>
<div class="container">
  <div class="title-bar">
    <h1>地推分區地圖</h1>
    <span>滑輪/雙指縮放地圖</span>
  </div>
  <div class="toggle-row">
    <span class="toggle-label">人員：</span>
    <div id="toggleRow" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
  </div>
  <div class="map-wrap">
    <svg id="map" viewBox="0 0 800 520"></svg>
    <div class="info-panel" id="panel" onclick="event.stopPropagation()">
      <span class="close" onclick="closePanel()">&times;</span>
      <div class="info-header">
        <div class="info-badge" id="p-badge"></div>
        <div>
          <div class="info-title" id="p-title"></div>
          <div class="info-sub" id="p-sub"></div>
        </div>
      </div>
      <div class="info-details">
        <dt>負責人</dt>
        <dd style="display: flex; align-items: center;">
          <span id="p-person"></span>
          <button class="edit-btn" id="edit-person-btn">修改</button>
        </dd>
        <dt>密度</dt><dd id="p-density"></dd>
        <dt>範圍</dt><dd id="p-coverage"></dd>
        <dt>備註</dt><dd id="p-note"></dd>
      </div>
    </div>
  </div>
  <div class="legend">
    <div class="legend-item"><span style="background:#2471a3"></span><span>有人(高密度)</span></div>
    <div class="legend-item"><span style="background:#1a6e3a"></span><span>有人(中低)</span></div>
    <div class="legend-item"><span style="background:#2c2c2c;border:1px solid #444"></span><span>暫無</span></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getDatabase, ref, onValue, set, get, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyChJSl71yDiQ1f24KAavDyw_1ViWe-Gc1M",
  authDomain: "hk-map-d0d52.firebaseapp.com",
  databaseURL: "https://hk-map-d0d52-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hk-map-d0d52",
  storageBucket: "hk-map-d0d52.firebasestorage.app",
  messagingSenderId: "713658993672",
  appId: "1:713658993672:web:e73f4a62f327c5b0e9d5bd"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const defaultZones = {
  "Central and Western":{id:1,person:"人員1",area:"中西區",coverage:"中環、上環、西營盤、堅尼地城",density:"高",dt:"high",region:"港島",note:"金融商業核心",on:true},
  "Wan Chai":{id:2,person:"人員2",area:"灣仔區",coverage:"灣仔、銅鑼灣、天后、跑馬地",density:"高",dt:"high",region:"港島",note:"購物商業旺區",on:true},
  "Eastern":{id:3,person:"人員3",area:"東區+南區",coverage:"北角、鰂魚涌、太古、筲箕灣",density:"低（合併）",dt:"low",region:"港島",note:"與南區合併",on:true},
  "Southern":{id:3,person:"人員3",area:"東區+南區",coverage:"香港仔、赤柱、黃竹坑",density:"低（合併）",dt:"low",region:"港島",note:"與東區合併",on:true},
  "Yau Tsim Mong":{id:5,person:"人員4/5/6",area:"油尖旺",coverage:"旺角、尖沙咀、油麻地（拆分3片區）",density:"高",dt:"high",region:"九龍",note:"旺角=人員4 / 尖沙咀=人員5 / 油麻地=人員6",on:true},
  "Sham Shui Po":{id:7,person:"人員7",area:"深水埗",coverage:"深水埗、長沙灣、荔枝角、鴨寮街",density:"中",dt:"mid",region:"九龍",note:"",on:true},
  "Kowloon City":{id:8,person:"人員8",area:"九龍城",coverage:"土瓜灣、紅磡、九龍城、何文田",density:"中",dt:"mid",region:"九龍",note:"",on:true},
  "Wong Tai Sin":{id:9,person:"人員9",area:"黃大仙",coverage:"黃大仙、鑽石山、慈雲山、新蒲崗",density:"中",dt:"mid",region:"九龍",note:"",on:true},
  "Kwun Tong":{id:10,person:"人員10",area:"觀塘",coverage:"觀塘、牛頭角、藍田、秀茂坪、工業區",density:"高",dt:"high",region:"九龍",note:"工商業密集",on:true},
  "Tsuen Wan":{id:11,person:"人員11",area:"荃灣+葵青",coverage:"荃灣市中心",density:"中",dt:"mid",region:"新界",note:"與葵青合併",on:true},
  "Kwai Tsing":{id:11,person:"人員11",area:"荃灣+葵青",coverage:"葵涌、青衣",density:"中",dt:"mid",region:"新界",note:"與荃灣合併",on:true},
  "Tuen Mun":{id:12,person:"人員12",area:"屯門",coverage:"屯門市中心、良景、三聖",density:"中",dt:"mid",region:"新界",note:"",on:true},
  "Yuen Long":{id:13,person:"人員13",area:"元朗+天水圍",coverage:"元朗市中心、天水圍、錦田、洪水橋",density:"中",dt:"mid",region:"新界",note:"",on:true},
  "North":{id:15,person:"人員15",area:"北區+西貢+離島",coverage:"上水、粉嶺",density:"低（合併）",dt:"low",region:"新界",note:"3區合併",on:true},
  "Tai Po":{id:14,person:"人員14",area:"沙田+大埔",coverage:"大埔墟、大埔工業邨",density:"中",dt:"mid",region:"新界",note:"與沙田合併",on:true},
  "Sha Tin":{id:14,person:"人員14",area:"沙田+大埔",coverage:"沙田市中心、火炭、大圍",density:"中",dt:"mid",region:"新界",note:"與大埔合併",on:true},
  "Sai Kung":{id:15,person:"人員15",area:"北區+西貢+離島",coverage:"將軍澳、西貢",density:"低（合併）",dt:"low",region:"新界",note:"3區合併",on:true},
  "Islands":{id:15,person:"人員15",area:"北區+西貢+離島",coverage:"東涌、大嶼山",density:"低（合併）",dt:"low",region:"新界",note:"3區合併",on:true}
};

window.zones = defaultZones; 
let curActive = null;

const zonesRef = ref(db, 'zones');
get(zonesRef).then((snapshot) => {
  if (!snapshot.exists()) set(zonesRef, defaultZones);
});

onValue(zonesRef, (snapshot) => {
  const data = snapshot.val();
  if (data) {
    window.zones = data;
    refresh();
    buildToggles();
    if (curActive && window.zones[curActive]) showPanel(window.zones[curActive]);
  }
});

const C_HIGH="#2471a3", C_MID="#1a6e3a", C_OFF="#2c2c2c", S_ON="#1e2a3a", S_OFF="#3a3a3a";
function gc(z){ if(!z||!z.on) return C_OFF; return z.dt==="high"?C_HIGH:C_MID; }
function getName(d){ return d.properties.name||d.properties.NAME_1||d.properties.NAME||d.id; }

const lp = {"Central and Western":[0,-4],"Wan Chai":[0,0],"Eastern":[5,0],"Southern":[0,5],"Yau Tsim Mong":[0,0],"Sham Shui Po":[0,-2],"Kowloon City":[0,0],"Wong Tai Sin":[3,0],"Kwun Tong":[5,0],"Tsuen Wan":[0,0],"Kwai Tsing":[0,0],"Tuen Mun":[0,0],"Yuen Long":[0,-5],"North":[0,0],"Tai Po":[0,0],"Sha Tin":[0,0],"Sai Kung":[0,-5],"Islands":[15,10]};
function cx(d){const n=getName(d);return path.centroid(d)[0]+(lp[n]?lp[n][0]:0);}
function cy(d){const n=getName(d);return path.centroid(d)[1]+(lp[n]?lp[n][1]:0);}

const svg=d3.select("#map");
// 這裡必須建立一個 g 標籤，縮放功能是作用在這個 g 標籤上
const mapGroup = svg.append("g");

const projection=d3.geoMercator().center([114.18,22.35]).scale(55000).translate([400,260]);
const path=d3.geoPath().projection(projection);

window.closePanel = function() {
  document.getElementById("panel").classList.remove("show");
  mapGroup.selectAll(".district").classed("active",false);
  curActive = null;
};

// 正確配置縮放 (Zoom) 功能
const zoom = d3.zoom()
  .scaleExtent([1, 10]) // 允許放大的倍數
  .on("zoom", (event) => {
    mapGroup.attr("transform", event.transform);
  });
svg.call(zoom);

mapGroup.append("rect").attr("width",800).attr("height",520).attr("fill","transparent")
  .on("click",()=>{ window.closePanel(); });

d3.json("https://cdn.jsdelivr.net/npm/datamaps@0.5.10/src/js/data/hkg.topo.json").then(topo=>{
  const key=Object.keys(topo.objects)[0];
  const feats=topojson.feature(topo,topo.objects[key]).features;

  mapGroup.selectAll("path.district").data(feats).join("path")
    .attr("class","district").attr("d",path)
    .each(function(d){applyStyle(d3.select(this),d);})
    .on("click",function(ev,d){
      ev.stopPropagation();
      const n=getName(d);
      if(curActive===n){ window.closePanel(); }
      else {
        mapGroup.selectAll(".district").classed("active",false);
        d3.select(this).classed("active",true);
        curActive=n;
        const z=window.zones[n];
        if(z) showPanel(z);
      }
    });

  mapGroup.selectAll("text.district-label").data(feats).join("text")
    .attr("class","district-label")
    .attr("x",d=>cx(d)).attr("y",d=>cy(d)-5)
    .text(d=>{const z=window.zones[getName(d)];return z?z.area.split("+")[0].split("—")[0].trim():getName(d);});

  mapGroup.selectAll("text.person-label").data(feats).join("text")
    .attr("class","person-label")
    .attr("x",d=>cx(d)).attr("y",d=>cy(d)+8);
    
  refresh();
});

function applyStyle(sel,d){
  const z=window.zones[getName(d)];
  sel.attr("fill",gc(z)).attr("stroke",z&&z.on?S_ON:S_OFF).attr("opacity",z&&z.on?1:0.4);
}

function refresh(){
  mapGroup.selectAll("path.district").each(function(d){applyStyle(d3.select(this),d);});
  mapGroup.selectAll("text.district-label").each(function(d){
    const z=window.zones[getName(d)];d3.select(this).attr("fill",z&&z.on?"#fff":"rgba(255,255,255,0.25)");
  });
  mapGroup.selectAll("text.person-label").each(function(d){
    const z=window.zones[getName(d)];
    d3.select(this).text(z?(z.on?z.person:"暫停"):"").attr("fill",z&&z.on?"rgba(255,255,255,0.65)":"rgba(255,255,255,0.2)");
  });
}

window.showPanel = function(z){
  const p=document.getElementById("panel");
  p.classList.remove("show");void p.offsetWidth;p.classList.add("show");
  document.getElementById("p-badge").style.background=gc(z);
  document.getElementById("p-badge").textContent=z.id;
  document.getElementById("p-title").textContent=z.area;
  document.getElementById("p-sub").textContent=z.region+" · "+z.density;
  document.getElementById("p-person").textContent=z.person;
  document.getElementById("p-density").textContent=z.density;
  document.getElementById("p-coverage").textContent=z.coverage;
  document.getElementById("p-note").textContent=z.note||"—";
}

function buildToggles(){
  const seen=new Set(),arr=[];
  Object.entries(window.zones).forEach(([n,z])=>{if(!seen.has(z.id)){seen.add(z.id);arr.push({n,z});}});
  arr.sort((a,b)=>a.z.id-b.z.id);
  const row=document.getElementById("toggleRow");
  row.innerHTML = ""; 
  arr.forEach(({n,z})=>{
    const b=document.createElement("button");
    b.className="toggle-btn"+(z.on?" on":"");
    b.textContent=z.person;
    b.onclick=()=>{
      const ns = !z.on;
      const updates = {};
      Object.entries(window.zones).forEach(([key, zz])=>{
        if(zz.id === z.id) updates['/zones/' + key + '/on'] = ns;
      });
      update(ref(db), updates);
    };
    row.appendChild(b);
  });
}

// 綁定修改按鈕
document.getElementById("edit-person-btn").onclick = () => {
  if (!curActive || !window.zones[curActive]) return; 
  const currentZone = window.zones[curActive];
  const newPerson = prompt(`請輸入【${currentZone.area}】的新負責人名稱：`, currentZone.person);
  if (newPerson !== null && newPerson.trim() !== "") {
    const finalName = newPerson.trim();
    const updates = {};
    Object.entries(window.zones).forEach(([key, zz])=>{
      if(zz.id === currentZone.id) updates['/zones/' + key + '/person'] = finalName;
    });
    update(ref(db), updates);
  }
};
</script>
</body>
</html>
