<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>地推團隊雲端即時統計板</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-950 text-slate-200">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    // ==========================================
    // 你的專屬 Firebase 配置 (已更新)
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyChJSl71yDiQ1f24KAavDyw_1ViWe-Gc1M",
      authDomain: "hk-map-d0d52.firebaseapp.com",
      databaseURL: "https://hk-map-d0d52-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "hk-map-d0d52",
      storageBucket: "hk-map-d0d52.firebasestorage.app",
      messagingSenderId: "713658993672",
      appId: "1:713658993672:web:e73f4a62f327c5b0e9d5bd",
      measurementId: "G-P371DX8BGQ"
    };

    // 初始化 Firebase
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();
    const docRef = db.collection('promoter_data').doc('dashboard_v1');

    function App() {
      const [managers, setManagers] = useState([]);
      const [loaded, setLoaded] = useState(false);
      const [saveState, setSaveState] = useState('idle');
      const [search, setSearch] = useState('');
      const [unpaidOnly, setUnpaidOnly] = useState(false);
      const [collapsed, setCollapsed] = useState({});
      const [confirmDelete, setConfirmDelete] = useState(null);
      
      const saveTimer = useRef(null);
      const isRemoteUpdate = useRef(false);

      // 監聽雲端資料
      useEffect(() => {
        const unsubscribe = docRef.onSnapshot((doc) => {
          if (doc.exists) {
            isRemoteUpdate.current = true;
            setManagers(doc.data().managers || []);
          } else {
            const defaultData = [{
              id: 'm1',
              managerName: '新負責人',
              bros: []
            }];
            setManagers(defaultData);
            docRef.set({ managers: defaultData });
          }
          setLoaded(true);
        }, (error) => {
          console.error("Firebase Error:", error);
        });
        return () => unsubscribe();
      }, []);

      // 自動同步到雲端
      useEffect(() => {
        if (!loaded) return;
        if (isRemoteUpdate.current) {
          isRemoteUpdate.current = false;
          return;
        }

        setSaveState('saving');
        if (saveTimer.current) clearTimeout(saveTimer.current);
        
        saveTimer.current = setTimeout(() => {
          docRef.set({ managers }).then(() => {
            setSaveState('saved');
            setTimeout(() => setSaveState('idle'), 1500);
          }).catch(() => setSaveState('idle'));
        }, 800);

        return () => saveTimer.current && clearTimeout(saveTimer.current);
      }, [managers, loaded]);

      // 計算邏輯
      const summary = useMemo(() => {
        let totalOrders = 0, totalAmount = 0, totalPaid = 0, paidCount = 0, broCount = 0;
        managers.forEach(m => m.bros.forEach(b => {
          totalOrders += Number(b.orders) || 0;
          totalAmount += Number(b.amount) || 0;
          broCount += 1;
          if (b.isPaid) { totalPaid += Number(b.amount) || 0; paidCount += 1; }
        }));
        const rate = totalAmount > 0 ? Math.round((totalPaid / totalAmount) * 100) : 0;
        return { totalOrders, totalAmount, totalPaid, paidCount, broCount, rate };
      }, [managers]);

      const teamStats = (bros) => {
        let orders = 0, amount = 0, paid = 0;
        bros.forEach(b => {
          orders += Number(b.orders) || 0;
          amount += Number(b.amount) || 0;
          if (b.isPaid) paid += Number(b.amount) || 0;
        });
        return { orders, amount, paid, outstanding: amount - paid };
      };

      // 操作函數
      const addManager = () => setManagers([...managers, { id: Date.now().toString(), managerName: '', bros: [] }]);
      const updateManagerName = (id, v) => setManagers(managers.map(m => m.id === id ? { ...m, managerName: v } : m));
      const deleteManager = (id) => setManagers(managers.filter(m => m.id !== id));
      const addBro = (mid) => setManagers(managers.map(m => m.id === mid
        ? { ...m, bros: [...m.bros, { id: Date.now().toString(), name: '', phone: '', orders: 0, amount: 0, isPaid: false }] }
        : m));
      const updateBro = (mid, bid, field, val) => setManagers(managers.map(m => m.id === mid
        ? { ...m, bros: m.bros.map(b => b.id === bid ? { ...b, [field]: val } : b) }
        : m));
      const deleteBro = (mid, bid) => setManagers(managers.map(m => m.id === mid
        ? { ...m, bros: m.bros.filter(b => b.id !== bid) } : m));
      const markTeamAllPaid = (mid) => setManagers(managers.map(m => m.id === mid
        ? { ...m, bros: m.bros.map(b => ({ ...b, isPaid: true })) } : m));

      const filteredManagers = useMemo(() => {
        const kw = search.trim().toLowerCase();
        return managers.map(m => ({
          ...m,
          bros: m.bros.filter(b => {
            const matchKw = !kw || (b.name && b.name.toLowerCase().includes(kw)) || (b.phone && b.phone.includes(kw)) || (m.managerName && m.managerName.toLowerCase().includes(kw));
            const matchPaid = !unpaidOnly || !b.isPaid;
            return matchKw && matchPaid;
          })
        })).filter(m => m.bros.length > 0 || (!kw && !unpaidOnly));
      }, [managers, search, unpaidOnly]);

      if (!loaded) return <div className="min-h-screen flex items-center justify-center bg-slate-950 text-slate-400 font-bold">☁️ 正在連接雲端資料庫...</div>;

      return (
        <div className="min-h-screen bg-slate-950 p-4 md:p-6 text-slate-200">
          <div className="max-w-7xl mx-auto">
            <header className="flex justify-between items-end mb-6">
              <div>
                <h1 className="text-2xl font-bold text-white">☁️ 實時雲端看板</h1>
                <p className="text-xs text-slate-500 mt-1">數據將在所有設備同步</p>
              </div>
              <div className={`text-xs px-3 py-1 rounded-full border ${saveState === 'saving' ? 'bg-amber-500/10 text-amber-400 border-amber-500/30' : saveState === 'saved' ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/30' : 'bg-blue-500/10 text-blue-400 border-blue-500/30'}`}>
                {saveState === 'saving' ? '⏳ 同步中...' : saveState === 'saved' ? '✅ 已同步' : '🌐 連線正常'}
              </div>
            </header>

            <div className="grid grid-cols-2 gap-4 mb-6">
              <div className="bg-blue-500/10 border border-blue-500/30 p-4 rounded-xl">
                <p className="text-xs text-blue-400">總新增單數</p>
                <p className="text-2xl font-bold text-blue-100">{summary.totalOrders}</p>
              </div>
              <div className="bg-emerald-500/10 border border-emerald-500/30 p-4 rounded-xl">
                <p className="text-xs text-emerald-400">已結金額</p>
                <p className="text-2xl font-bold text-emerald-100">${summary.totalPaid}</p>
              </div>
            </div>

            <div className="flex gap-2 mb-6">
              <input type="text" placeholder="🔍 搜尋姓名或電話..." value={search} onChange={e => setSearch(e.target.value)} className="flex-1 bg-slate-900 border border-slate-800 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
              <button onClick={() => setUnpaidOnly(!unpaidOnly)} className={`px-4 py-2 rounded-lg text-sm border ${unpaidOnly ? 'bg-rose-500 text-white border-rose-500' : 'bg-slate-900 border-slate-800 text-slate-400'}`}>未結</button>
            </div>

            <div className="space-y-4">
              {filteredManagers.map(manager => {
                const stats = teamStats(manager.bros);
                return (
                  <div key={manager.id} className="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden">
                    <div className="bg-slate-800/50 p-3 flex justify-between items-center border-b border-slate-800">
                      <input type="text" value={manager.managerName} onChange={e => updateManagerName(manager.id, e.target.value)} placeholder="負責人姓名" className="bg-transparent font-bold text-white focus:outline-none" />
                      <button onClick={() => setConfirmDelete({type:'manager', mid:manager.id})} className="text-xs text-rose-400">🗑️ 刪除</button>
                    </div>
                    <div className="p-3">
                      <div className="space-y-3">
                        {manager.bros.map(bro => (
                          <div key={bro.id} className={`p-3 rounded-lg border ${bro.isPaid ? 'bg-emerald-500/5 border-emerald-500/20' : 'bg-slate-950/50 border-slate-800'}`}>
                            <div className="flex gap-2 mb-2">
                              <input type="text" value={bro.name} onChange={e => updateBro(manager.id, bro.id, 'name', e.target.value)} placeholder="小老弟" className="flex-1 bg-slate-800 border-none rounded px-2 py-1 text-sm" />
                              <button onClick={() => setConfirmDelete({type:'bro', mid:manager.id, bid:bro.id})} className="text-slate-600">❌</button>
                            </div>
                            <div className="grid grid-cols-2 gap-2">
                              <div className="flex items-center justify-between bg-slate-800 rounded px-2">
                                <button onClick={() => updateBro(manager.id, bro.id, 'orders', Math.max(0, bro.orders-1))} className="text-rose-400 p-1">➖</button>
                                <span className="font-bold text-sm">{bro.orders}</span>
                                <button onClick={() => updateBro(manager.id, bro.id, 'orders', (bro.orders||0)+1)} className="text-blue-400 p-1">➕</button>
                              </div>
                              <button onClick={() => updateBro(manager.id, bro.id, 'isPaid', !bro.isPaid)} className={`text-xs font-bold rounded ${bro.isPaid ? 'bg-emerald-500 text-white' : 'bg-slate-700 text-slate-300'}`}>
                                {bro.isPaid ? '✅ 已結帳' : '未結帳'}
                              </button>
                            </div>
                          </div>
                        ))}
                      </div>
                      <button onClick={() => addBro(manager.id)} className="w-full mt-3 py-2 border border-dashed border-slate-700 rounded-lg text-xs text-slate-500 hover:text-slate-300 hover:border-slate-500 transition-colors">➕ 新增小老弟</button>
                    </div>
                  </div>
                );
              })}
            </div>

            <button onClick={addManager} className="w-full mt-8 py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold shadow-lg transition-colors">➕ 建立新大區團隊</button>
          </div>

          {confirmDelete && (
            <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
              <div className="bg-slate-900 border border-slate-800 p-6 rounded-2xl max-w-xs w-full">
                <p className="text-white font-bold mb-4 text-center">確定要刪除嗎？</p>
                <div className="flex gap-3">
                  <button onClick={() => setConfirmDelete(null)} className="flex-1 py-2 bg-slate-800 rounded-lg">取消</button>
                  <button onClick={() => {
                    if(confirmDelete.type==='manager') deleteManager(confirmDelete.mid);
                    else deleteBro(confirmDelete.mid, confirmDelete.bid);
                    setConfirmDelete(null);
                  }} className="flex-1 py-2 bg-rose-500 text-white rounded-lg">確認</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
