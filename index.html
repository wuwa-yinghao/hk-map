<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>香港地推分區地圖</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "PingFang HK", "Microsoft JhengHei", sans-serif; background: #0d1117; color: #e0e0e0; }
.container { max-width: 900px; margin: 0 auto; background: #161b22; min-height: 100vh; }
.title-bar { background: #0f2940; color: #fff; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
.title-bar h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.5px; }
.title-bar span { font-size: 13px; opacity: 0.6; }
.map-wrap { position: relative; padding: 12px; }
svg { width: 100%; height: auto; display: block; }
.district { cursor: pointer; transition: filter 0.2s, stroke-width 0.2s, opacity 0.3s; stroke-width: 1.5; }
.district:hover { filter: brightness(1.3); stroke-width: 2.5; }
.district.active { stroke: #c8973e !important; stroke-width: 3; filter: brightness(1.2); }
.district-label { pointer-events: none; font-size: 10.5px; font-weight: 600; text-anchor: middle; dominant-baseline: central; }
.person-label { pointer-events: none; font-size: 8.5px; font-weight: 500; text-anchor: middle; dominant-baseline: central; }
.info-panel {
  position: absolute; bottom: 16px; left: 16px; right: 16px;
  background: #1c2333; border: 1px solid #2d3a4e; border-radius: 12px;
  padding: 16px 20px; display: none; z-index: 10;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.info-panel.show { display: block; animation: slideUp 0.25s ease-out; }
@keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.info-panel .close { position: absolute; top: 10px; right: 14px; cursor: pointer; font-size: 20px; color: #555; line-height: 1; }
.info-panel .close:hover { color: #aaa; }
.info-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.info-badge { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 15px; flex-shrink: 0; }
.info-title { font-size: 17px; font-weight: 600; color: #fff; }
.info-sub { font-size: 13px; color: #6a8099; margin-top: 2px; }
.info-details { display: grid; grid-template-columns: auto 1fr; gap: 6px 16px; font-size: 13px; align-items: center; }
.info-details dt { color: #4a6070; margin-top: 4px; }
.info-details dd { font-weight: 500; color: #b8c8d8; margin-top: 4px; }
.status-tag { display: inline-block; font-size: 11px; padding: 2px 10px; border-radius: 4px; font-weight: 600; }
.status-on { background: rgba(46,204,113,0.15); color: #2ecc71; }
.status-off { background: rgba(149,165,166,0.15); color: #7f8c8d; }
.legend { display: flex; flex-wrap: wrap; gap: 14px; padding: 14px 20px; border-top: 1px solid #1e2a3a; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #6a8099; }
.legend-item span:first-child { width: 14px; height: 14px; border-radius: 3px; display: inline-block; }
.toggle-row { display: flex; gap: 6px; padding: 10px 20px; border-bottom: 1px solid #1e2a3a; flex-wrap: wrap; align-items: center; }
.toggle-label { font-size: 12px; color: #4a6070; margin-right: 4px; }
.toggle-btn { font-size: 11px; padding: 4px 10px; border-radius: 6px; border: 1px solid #2d3a4e; background: transparent; color: #556; cursor: pointer; transition: all 0.2s; }
.toggle-btn:hover { border-color: #4a90d9; color: #4a90d9; }
.toggle-btn.on { background: #1a4a2e; color: #2ecc71; border-color: #1a4a2e; }

/* 這是新加入的：修改按鈕樣式 */
.edit-btn { margin-left: 8px; padding: 2px 8px; font-size: 11px; background: #2d3a4e; color: #b8c8d8; border: 1px solid #4a6070; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
.edit-btn:hover { background: #4a90d9; color: #fff; border-color: #4a90d9; }
</style>
</head>
<body>
<div class="container">
  <div class="title-bar">
    <h1>地推分區地圖</h1>
    <span>點擊區域查看/收起詳情</span>
  </div>
  <div class="toggle-row">
    <span class="toggle-label">人員狀態：</span>
    <div id="toggleRow" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
  </div>
  <div class="map-wrap">
    <svg id="map" viewBox="0 0 800 520"></svg>
    <div class="info-panel" id="panel" onclick="event.stopPropagation()">
      <span class="close" onclick="closePanel()">&times;</span>
      <div class="info-header">
        <div class="info-badge" id="p-badge"></div>
        <div>
          <div class="info-title" id="p-title"></div>
          <div class="info-sub" id="p-sub"></div>
        </div>
      </div>
      <div class="info-details">
        <dt>負責人</dt>
        <dd style="display: flex; align-items: center;">
          <span id="p-person"></span>
          <button class="edit-btn" id="edit-person-btn">修改</button>
        </dd>
        <dt>商業密度</dt><dd id="p-density"></dd>
        <dt>覆蓋範圍</dt><dd id="p-coverage"></dd>
        <dt>狀態</dt><dd id="p-status"></dd>
        <dt>備註</dt><dd id="p-note"></dd>
      </div>
    </div>
  </div>
  <div class="legend">
    <div class="legend-item"><span style="background:#2471a3"></span><span>有人在跑（高密度）</span></div>
    <div class="legend-item"><span style="background:#1a6e3a"></span><span>有人在跑（中/低密度）</span></div>
    <div class="legend-item"><span style="background:#2c2c2c;border:1px solid #444"></span><span>暫無人跑</span></div>
  </div>
</div>
