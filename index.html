<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>香港地推路名地圖 - 團隊管理版</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
/* 滿版核心設定 */
html, body { height: 100%; width: 100%; overflow: hidden; margin: 0; padding: 0; }
body { font-family: -apple-system, "PingFang HK", "Microsoft JhengHei", sans-serif; background: #0d1117; color: #e0e0e0; }
.container { width: 100%; height: 100vh; display: flex; flex-direction: column; }

.title-bar { background: #0f2940; color: #fff; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 1000; }
.title-bar h1 { font-size: 18px; font-weight: 600; }

/* 地圖容器 */
#map { flex-grow: 1; width: 100%; background: #0d1117; z-index: 1; }

.info-panel {
  position: absolute; bottom: 20px; left: 16px; right: 16px;
  background: rgba(28, 35, 51, 0.96); border: 1px solid #2d3a4e; border-radius: 12px;
  padding: 16px 20px; display: none; z-index: 1001;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5); backdrop-filter: blur(10px);
  max-height: 75vh; overflow-y: auto; /* 若內容過多允許上下滑動 */
}
.info-panel.show { display: block; }
.info-panel .close { position: absolute; top: 10px; right: 14px; cursor: pointer; font-size: 24px; color: #888; padding: 4px;}

.info-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.info-badge { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 15px; flex-shrink: 0;}
.info-title { font-size: 17px; font-weight: 600; color: #fff; }
.info-details { display: grid; grid-template-columns: 50px 1fr; gap: 10px 16px; font-size: 13px; align-items: start; }
.info-details dt { color: #6a8099; padding-top: 2px; }
.info-details dd { color: #b8c8d8; font-weight: 500; margin: 0; }

/* 跑腿名單專屬樣式 */
.runner-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 6px; }
.runner-item { background: rgba(255,255,255,0.04); padding: 8px 10px; border-radius: 6px; border: 1px solid #2d3a4e; }
.runner-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.runner-name { font-weight: 600; color: #4a90d9; font-size: 14px; }
.runner-actions button { background: none; border: none; color: #7f8c8d; cursor: pointer; font-size: 11px; margin-left: 8px; transition: color 0.2s;}
.runner-actions button:hover { color: #fff; }
.runner-roads { font-size: 12px; color: #95a5a6; line-height: 1.4; }

.legend { display: flex; flex-wrap: wrap; gap: 14px; padding: 10px 20px; border-top: 1px solid #1e2a3a; flex-shrink: 0; background: #161b22; z-index: 1000; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #6a8099; }
.legend-item span:first-child { width: 12px; height: 12px; border-radius: 2px; }

.toggle-row { display: flex; gap: 6px; padding: 10px 20px; border-bottom: 1px solid #1e2a3a; flex-wrap: wrap; align-items: center; flex-shrink: 0; background: #161b22; z-index: 1000; }
.toggle-btn { font-size: 11px; padding: 6px 10px; border-radius: 6px; border: 1px solid #2d3a4e; background: transparent; color: #7f8c8d; cursor: pointer; }
.toggle-btn.on { background: #1a4a2e; color: #2ecc71; border-color: #1a4a2e; }
.edit-btn { padding: 4px 10px; font-size: 11px; background: #2d3a4e; color: #b8c8d8; border: 1px solid #4a6070; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
.edit-btn:hover { background: #4a90d9; color: #fff; border-color: #4a90d9; }

@media (max-width: 600px) {
  .info-panel { bottom: 0; left: 0; right: 0; border-radius: 16px 16px 0 0; padding: 20px 20px 30px 20px; border: none; max-height: 85vh; }
}
</style>
</head>
<body>
<div class="container">
  <div class="title-bar">
    <h1>香港地推路名地圖 (團隊版)</h1>
    <span id="sync-status">數據同步中...</span>
  </div>
  <div class="toggle-row" id="toggleRow"></div>
  <div id="map"></div>
  <div class="info-panel" id="panel">
    <span class="close" onclick="closePanel()">&times;</span>
    <div class="info-header">
      <div class="info-badge" id="p-badge"></div>
      <div><div class="info-title" id="p-title"></div></div>
    </div>
    <div class="info-details">
      <dt>大區主管</dt>
      <dd style="display:flex;align-items:center;">
        <span id="p-person" style="margin-right: 8px;"></span>
        <button class="edit-btn" id="edit-person-btn">修改</button>
      </dd>
      
      <dt>大區備註</dt>
      <dd style="display:flex;align-items:center;">
        <span id="p-note" style="margin-right: 8px;"></span>
        <button class="edit-btn" id="edit-note-btn">修改</button>
      </dd>

      <dt style="margin-top: 8px; color: #e67e22; font-weight:bold;">跑腿團隊</dt>
      <dd style="margin-top: 8px;">
        <div id="p-runners-list" class="runner-list"></div>
        <button class="edit-btn" id="add-runner-btn" style="margin-top:4px;">+ 新增跑腿與路線</button>
      </dd>
    </div>
  </div>
  <div class="legend">
    <div class="legend-item"><span style="background:#2471a3;opacity:0.6"></span><span>有人(高密度)</span></div>
    <div class="legend-item"><span style="background:#1a6e3a;opacity:0.6"></span><span>有人(中低)</span></div>
    <div class="legend-item"><span style="background:#2c2c2c;opacity:0.4"></span><span>暫無</span></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyChJSl71yDiQ1f24KAavDyw_1ViWe-Gc1M",
  authDomain: "hk-map-d0d52.firebaseapp.com",
  databaseURL: "https://hk-map-d0d52-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hk-map-d0d52",
  storageBucket: "hk-map-d0d52.firebasestorage.app",
  messagingSenderId: "713658993672",
  appId: "1:713658993672:web:e73f4a62f327c5b0e9d5bd"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
let curActive = null;
window.zones = {};

// 初始化 Leaflet 地圖
const map = L.map('map', { zoomControl: false }).setView([22.35, 114.18], 11);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

let geoLayer = null;

fetch("https://cdn.jsdelivr.net/npm/datamaps@0.5.10/src/js/data/hkg.topo.json")
  .then(res => res.json())
  .then(topoData => {
    const key = Object.keys(topoData.objects)[0];
    const geojson = topojson.feature(topoData, topoData.objects[key]);
    
    onValue(ref(db, 'zones'), (snapshot) => {
      window.zones = snapshot.val();
      document.getElementById('sync-status').textContent = "數據已同步";
      renderMap(geojson);
      buildToggles();
      if(curActive && window.zones[curActive]) {
        showPanel(window.zones[curActive]);
      }
    });
  });

function getZoneColor(z) {
  if (!z || !z.on) return "#2c2c2c";
  return z.dt === "high" ? "#2471a3" : "#1a6e3a";
}

function renderMap(geojson) {
  if (geoLayer) map.removeLayer(geoLayer);
  geoLayer = L.geoJSON(geojson, {
    style: (feature) => {
      const z = window.zones[feature.properties.name || feature.id];
      return {
        fillColor: getZoneColor(z),
        weight: 1.5,
        opacity: 0.8,
        color: '#1e2a3a',
        fillOpacity: z && z.on ? 0.5 : 0.2
      };
    },
    onEachFeature: (feature, layer) => {
      layer.on('click', (e) => {
        const name = feature.properties.name || feature.id;
        curActive = name;
        showPanel(window.zones[name]);
        L.DomEvent.stopPropagation(e);
      });
    }
  }).addTo(map);
}

window.showPanel = function(z) {
  if(!z) return;
  const p = document.getElementById("panel");
  p.classList.add("show");
  document.getElementById("p-badge").style.background = getZoneColor(z);
  document.getElementById("p-badge").textContent = z.id;
  document.getElementById("p-title").textContent = z.area;
  document.getElementById("p-person").textContent = z.person;
  document.getElementById("p-note").textContent = z.note || "—";
  
  // 渲染跑腿清單
  const runnersList = document.getElementById("p-runners-list");
  runnersList.innerHTML = "";
  const runners = z.runners || [];
  
  if (runners.length === 0) {
    runnersList.innerHTML = '<span style="color:#7f8c8d;font-size:12px;">尚未指派跑腿</span>';
  } else {
    runners.forEach((r, idx) => {
      const div = document.createElement("div");
      div.className = "runner-item";
      div.innerHTML = `
        <div class="runner-header">
          <span class="runner-name">${r.name}</span>
          <div class="runner-actions">
            <button onclick="editRunner(${idx})">編輯</button>
            <button onclick="deleteRunner(${idx})">刪除</button>
          </div>
        </div>
        <div class="runner-roads">負責路段：${r.roads || "未填寫"}</div>
      `;
      runnersList.appendChild(div);
    });
  }
};

window.closePanel = function() {
  document.getElementById("panel").classList.remove("show");
  curActive = null;
};

function buildToggles() {
  const row = document.getElementById("toggleRow");
  row.innerHTML = "";
  const seen = new Set();
  Object.entries(window.zones).forEach(([name, z]) => {
    if (seen.has(z.id)) return;
    seen.add(z.id);
    const b = document.createElement("button");
    b.className = "toggle-btn" + (z.on ? " on" : "");
    // 切換列顯示分區主管的名字
    b.textContent = z.person;
    b.onclick = () => {
      const ns = !z.on;
      const updates = {};
      Object.entries(window.zones).forEach(([key, val]) => {
        if(val.id === z.id) updates['zones/' + key + '/on'] = ns;
      });
      update(ref(db), updates);
    };
    row.appendChild(b);
  });
}

// 修改大區主管
document.getElementById("edit-person-btn").onclick = () => {
  if (!curActive) return;
  const newPerson = prompt("請輸入該區「主管/負責人」名稱：", window.zones[curActive].person);
  if (newPerson) {
    const updates = {};
    const targetId = window.zones[curActive].id;
    Object.entries(window.zones).forEach(([key, val]) => {
      if(val.id === targetId) updates['zones/' + key + '/person'] = newPerson.trim();
    });
    update(ref(db), updates);
  }
};

// 修改大區備註
document.getElementById("edit-note-btn").onclick = () => {
  if (!curActive) return;
  const newNote = prompt("請輸入備註：", window.zones[curActive].note);
  if (newNote !== null) {
    const updates = {};
    const targetId = window.zones[curActive].id;
    Object.entries(window.zones).forEach(([key, val]) => {
      if(val.id === targetId) updates['zones/' + key + '/note'] = newNote.trim();
    });
    update(ref(db), updates);
  }
};

// === 跑腿與街道管理全域函數 ===

// 1. 新增跑腿
document.getElementById("add-runner-btn").onclick = () => {
  if (!curActive) return;
  const newName = prompt("請輸入新「跑腿」的名字：");
  if (!newName || newName.trim() === "") return;
  
  const newRoads = prompt(`請輸入【${newName}】負責的街道名稱\n(多條路段請用逗號分隔)：`);
  if (newRoads === null) return;
  
  const targetId = window.zones[curActive].id;
  const updates = {};
  
  Object.entries(window.zones).forEach(([key, val]) => {
    if (val.id === targetId) {
      // 拷貝現有跑腿清單，若無則建立空陣列
      const currentRunners = val.runners ? JSON.parse(JSON.stringify(val.runners)) : [];
      currentRunners.push({ name: newName.trim(), roads: newRoads.trim() });
      updates['zones/' + key + '/runners'] = currentRunners;
    }
  });
  update(ref(db), updates);
};

// 2. 編輯跑腿資料
window.editRunner = function(idx) {
  if (!curActive) return;
  const z = window.zones[curActive];
  const runner = z.runners[idx];
  
  const newName = prompt("修改跑腿名字：", runner.name);
  if (newName === null || newName.trim() === "") return;
  
  const newRoads = prompt(`修改【${newName}】的負責路段：`, runner.roads);
  if (newRoads === null) return;
  
  const targetId = z.id;
  const updates = {};
  
  Object.entries(window.zones).forEach(([key, val]) => {
    if (val.id === targetId) {
      const currentRunners = JSON.parse(JSON.stringify(val.runners));
      currentRunners[idx] = { name: newName.trim(), roads: newRoads.trim() };
      updates['zones/' + key + '/runners'] = currentRunners;
    }
  });
  update(ref(db), updates);
};

// 3. 刪除跑腿
window.deleteRunner = function(idx) {
  if (!curActive) return;
  if (!confirm("確定要將這位跑腿從這個分區刪除嗎？")) return;
  
  const targetId = window.zones[curActive].id;
  const updates = {};
  
  Object.entries(window.zones).forEach(([key, val]) => {
    if (val.id === targetId) {
      const currentRunners = JSON.parse(JSON.stringify(val.runners));
      currentRunners.splice(idx, 1); // 刪除指定索引的跑腿
      updates['zones/' + key + '/runners'] = currentRunners;
    }
  });
  update(ref(db), updates);
};

</script>
</body>
</html>
